name: Update weather data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch weather data
        run: |
          echo "Running fetch..."
          python scripts/fetch_weather.py

      - name: Debug after fetch
        run: |
          echo "------ DEBUG START ------"
          echo "Current directory:"
          pwd
          echo ""

          echo "Repo structure:"
          ls -R
          echo ""

          echo "Data directory:"
          ls -lah data || echo "data folder not found"

          echo "------ DEBUG END ------"

      - name: Build summary
        run: |
          python scripts/build_all_min.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "Auto update weather data" || echo "No changes to commit"

          git pull --rebase origin main || echo "No pull needed"

          git push
